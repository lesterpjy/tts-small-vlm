# Qwen2.5-VL-7B DTR + PRM-BAS search on dev-200. Majority vote verification.
# Beam-annealing search guided by Qwen-VL-PRM step scores replaces flat
# M-sample reasoning in Stage 2.

variant: q25_prm_bas_dev
pipeline: msa
runner: dtr
tags: [prm_bas, majority_vote, qwen_vl_prm]

model:
  name: "Qwen/Qwen2.5-VL-7B-Instruct"
  backend: vllm
  dtype: bfloat16
  max_model_len: 16384
  gpu_memory_utilization: 0.45

describe:
  n_samples: 2
  temperature: 0.7
  max_tokens: 1024

reason:
  temperature: 0.7
  max_tokens: 1024
  use_cot: true
  cot_style: mmmu

search:
  method: prm_bas
  step_scorer:
    method: qwen_vl_prm
  prm_bas:
    B0: 4
    B: 2
    anneal_tau: 0.05
    max_depth: 6
    max_step_tokens: 256
    stop_marker: "answer:"

verify:
  method: majority_vote

evaluation:
  subset_size: 200
  seed: 42
  stratify: true
  min_per_language: 10
