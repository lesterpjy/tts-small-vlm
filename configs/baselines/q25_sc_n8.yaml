# Qwen2.5-VL-7B self-consistency N=8 on full validation (n=4651).
# MMMU-style CoT prompt with majority vote aggregation.

variant: q25_sc_n8
pipeline: baseline
runner: self_consistency
tags: [baseline, self_consistency, N8, mmmu_prompt, val_full]

model:
