# Qwen3.5-4B single-chain CoT on full validation (n=4651).
# MMMU-style prompt (Yue et al. 2024).

variant: q35_cot
pipeline: baseline
runner: cot
tags: [baseline, cot, mmmu_prompt, val_full]

model:
  name: "Qwen/Qwen3.5-4B"
  backend: vllm
  dtype: bfloat16
  max_model_len: 16384

generation:
  prompt_style: mmmu
  temperature: 0.0
  max_new_tokens: 1024

evaluation:
  dataset: examsv_validation
  subset_size: null
  seed: 42
